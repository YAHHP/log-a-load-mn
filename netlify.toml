[build]
  command = "npm run build"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "DENY"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; img-src 'self' data:; script-src 'self'; style-src 'self'; connect-src 'self' https://www.paypal.com https://www.sandbox.paypal.com https://buy.stripe.com https://checkout.stripe.com https://venmo.com https://account.venmo.com; form-action 'self' https://www.paypal.com https://www.sandbox.paypal.com https://buy.stripe.com https://checkout.stripe.com https://venmo.com https://account.venmo.com"
